<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gpu-adept validation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      padding: 2rem;
    }
    h1 { margin-bottom: 0.25rem; }
    p.sub { color: #888; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .card { background: #1a1a2e; border-radius: 8px; padding: 1rem; }
    .card h3 { margin-bottom: 0.5rem; font-size: 0.9375rem; color: #aaa; }
    .card img { width: 100%; height: auto; border-radius: 4px; }
    .card .info { margin-top: 0.5rem; font-size: 0.8125rem; color: #888; }
    #controls { margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    button {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 6px;
      background: #4af;
      color: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #38d; }
    button:disabled { background: #444; cursor: not-allowed; }
    #status { margin-top: 1rem; font-size: 0.875rem; color: #aaa; }
    .pass { color: #4a4; }
    .fail { color: #f44; }
  </style>
</head>
<body>
  <h1>gpu-adept validation</h1>
  <p class="sub">Compare gpu-adept output to reference ImageMagick output</p>

  <div id="controls">
    <button id="run-btn" disabled>Run Validation</button>
    <label>
      Test image:
      <select id="test-image">
        <option value="original/lena.q100.jpg">lena.q100.jpg (512×512)</option>
      </select>
    </label>
    <label>
      Tile size:
      <select id="tile-size">
        <option value="auto" selected>Auto</option>
        <option value="8">8×8</option>
        <option value="16">16×16</option>
        <option value="32">32×32</option>
      </select>
    </label>
  </div>

  <div id="status">Loading test image...</div>

  <div class="grid">
    <div class="card">
      <h3>Original</h3>
      <img id="original-img" alt="original" />
      <div class="info" id="original-info"></div>
    </div>
    <div class="card">
      <h3>Reference (ImageMagick)</h3>
      <img id="reference-img" alt="reference" />
      <div class="info" id="reference-info"></div>
    </div>
    <div class="card">
      <h3>gpu-adept</h3>
      <img id="result-img" alt="result" />
      <div class="info" id="result-info"></div>
    </div>
    <div class="card">
      <h3>Difference (×10)</h3>
      <canvas id="diff-canvas"></canvas>
      <div class="info" id="diff-info"></div>
    </div>
  </div>

  <script type="module" src="./validate.js"></script>
</body>
</html>
